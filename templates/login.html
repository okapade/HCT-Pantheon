<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantheon — Access</title>
  <link rel="icon" type="image/png" href="/static/assets/PantheonLogoGold.png">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--s0:#0a0a0a;--s1:#111;--s2:#1a1a1a;--s3:#222;--b1:#2a2a2a;--b2:#333;--t0:#f5f5f5;--t1:#ccc;--t2:#999;--t3:#666;--t4:#444;--acc:#c9a84c;--acc2:#b8963f;--red:#e74c3c;--green:#2ecc71;--sans:'IBM Plex Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--sans);background:var(--s0);color:var(--t0);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}

    .login-bg{position:fixed;inset:0;z-index:0}
    .login-bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(201,168,76,.06) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(201,168,76,.03) 0%,transparent 50%)}
    .login-bg .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(201,168,76,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.03) 1px,transparent 1px);background-size:60px 60px}

    .login-card{position:relative;z-index:1;width:100%;max-width:420px;padding:48px 40px;background:var(--s1);border:1px solid var(--b1);border-radius:16px;box-shadow:0 40px 80px rgba(0,0,0,.5)}

    .login-logo{display:flex;align-items:center;gap:12px;margin-bottom:8px}
    .login-logo img{width:36px;height:36px;border-radius:8px}
    .login-logo span{font:700 20px/1 var(--sans);color:var(--acc);letter-spacing:2px}

    .login-sub{font:400 13px/1.5 var(--sans);color:var(--t3);margin-bottom:36px}

    .login-field{margin-bottom:20px}
    .login-label{display:block;font:500 11px/1 var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
    .login-input{width:100%;padding:12px 14px;background:var(--s2);border:1px solid var(--b2);border-radius:8px;color:var(--t0);font:400 14px/1 var(--sans);outline:none;transition:border-color .2s}
    .login-input:focus{border-color:var(--acc)}
    .login-input::placeholder{color:var(--t4)}

    .login-btn{width:100%;padding:14px;background:var(--acc);color:var(--s0);font:600 14px/1 var(--sans);border:none;border-radius:8px;cursor:pointer;transition:all .2s;letter-spacing:.3px;margin-top:8px}
    .login-btn:hover{background:var(--acc2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(201,168,76,.3)}
    .login-btn:active{transform:translateY(0)}
    .login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

    .login-error{display:none;padding:10px 14px;background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.2);border-radius:8px;color:var(--red);font:400 12px/1.4 var(--sans);margin-bottom:16px}
    .login-error.show{display:block}

    .login-footer{margin-top:32px;padding-top:20px;border-top:1px solid var(--b1);text-align:center}
    .login-footer span{font:400 11px/1 var(--mono);color:var(--t4)}
    .login-footer a{color:var(--acc);text-decoration:none}
    .login-footer a:hover{text-decoration:underline}

    .login-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--s2);border:1px solid var(--b2);border-radius:20px;font:400 10px/1 var(--mono);color:var(--t3);margin-bottom:24px}
    .login-badge .dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    .powered{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font:400 10px/1 var(--mono);color:var(--t4);z-index:1}
    .powered img{width:14px;height:14px;vertical-align:middle;margin:0 2px;opacity:.4}
  </style>
</head>
<body>
  <div class="login-bg"><div class="grid"></div></div>

  <div class="login-card">
    <div class="login-logo">
      <img src="/static/assets/PantheonLogoGold.png" alt="Pantheon">
      <span>PANTHEON</span>
    </div>
    <div class="login-sub">Fire protection intelligence platform. Enter your credentials to access your facility analysis.</div>

    <div class="login-badge"><span class="dot"></span> System Online — 90-Day Trial</div>

    <div class="login-error" id="loginError"></div>

    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="login-field">
        <label class="login-label">Email or Phone</label>
        <input class="login-input" id="loginId" type="text" placeholder="you@company.com or +1234567890" autocomplete="email" required>
      </div>
      <div class="login-field">
        <label class="login-label">Access Code</label>
        <input class="login-input" id="loginCode" type="text" placeholder="6-character code from HCT" maxlength="6" style="letter-spacing:4px;text-transform:uppercase;font-family:var(--mono);font-size:18px;text-align:center" autocomplete="off" required>
      </div>
      <button class="login-btn" type="submit" id="loginBtn">Access Pantheon</button>
    </form>

    <div class="login-footer">
      <span>Need access? Contact your HCT representative<br>or email <a href="mailto:support@hct-world.com">support@hct-world.com</a></span>
    </div>
  </div>

  <div class="powered">Hazard Control Technologies × Embedded Logix</div>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      btn.disabled = true;
      btn.textContent = 'Verifying...';
      err.classList.remove('show');

      try {
        const r = await fetch('/api/auth/verify', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            identifier: document.getElementById('loginId').value.trim(),
            code: document.getElementById('loginCode').value.trim()
          })
        });
        const d = await r.json();
        if (r.ok && d.ok) {
          btn.textContent = 'Welcome, ' + (d.name || 'User');
          btn.style.background = '#2ecc71';
          setTimeout(() => window.location.href = '/', 800);
        } else {
          err.textContent = d.error || 'Invalid credentials';
          err.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Access Pantheon';
        }
      } catch(ex) {
        err.textContent = 'Connection error. Please try again.';
        err.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Access Pantheon';
      }
    }
  </script>
</body>
</html>
