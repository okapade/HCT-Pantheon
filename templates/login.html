<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantheon — Sign In</title>
  <link rel="icon" type="image/png" href="/static/assets/PantheonLogoGold.png">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:   #C8A84B;
      --gold2:  #E2C46A;
      --bg:     #0A0A0B;
      --bg2:    #111113;
      --bg3:    #18181C;
      --border: rgba(200,168,75,0.18);
      --text:   #F0EDE8;
      --muted:  #7A7670;
      --red:    #E05555;
      --mono:   'IBM Plex Mono', monospace;
      --sans:   'IBM Plex Sans', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    /* ── background grid ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(200,168,75,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,168,75,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%; max-width: 400px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 36px 36px;
      box-shadow: 0 0 80px rgba(200,168,75,0.06), 0 24px 48px rgba(0,0,0,0.5);
    }

    /* ── logo ── */
    .logo-wrap {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 32px;
    }
    .logo-img { width: 36px; height: 36px; object-fit: contain; }
    .logo-text {
      font-family: var(--mono);
      font-size: 15px; font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--gold);
    }
    .logo-sub {
      font-size: 10px; color: var(--muted);
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-top: 1px;
    }

    h1 {
      font-size: 20px; font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .sub {
      font-size: 13px; color: var(--muted);
      margin-bottom: 28px; line-height: 1.5;
    }

    /* ── form ── */
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input {
      width: 100%; height: 44px;
      background: var(--bg3);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 7px;
      padding: 0 14px;
      font-family: var(--sans); font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: rgba(200,168,75,0.5); }
    input::placeholder { color: var(--muted); }

    .btn {
      width: 100%; height: 46px;
      background: var(--gold);
      border: none; border-radius: 7px;
      font-family: var(--mono); font-size: 13px;
      font-weight: 600; letter-spacing: 0.08em;
      color: #0A0A0B;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s, opacity 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:hover  { background: var(--gold2); }
    .btn:active { opacity: 0.85; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── error / info ── */
    .msg {
      display: none;
      font-size: 13px; border-radius: 7px;
      padding: 10px 14px; margin-bottom: 16px;
      line-height: 1.45;
    }
    .msg.error { background: rgba(224,85,85,0.12); border: 1px solid rgba(224,85,85,0.3); color: #F08080; display: block; }
    .msg.info  { background: rgba(200,168,75,0.08); border: 1px solid rgba(200,168,75,0.25); color: var(--gold2); display: block; }

    /* ── OTP step (hidden by default) ── */
    #otpStep { display: none; }

    /* ── footer ── */
    .footer {
      margin-top: 28px; padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
      font-size: 11px; color: var(--muted);
      text-align: center; line-height: 1.6;
    }
    .footer a { color: var(--gold); text-decoration: none; }

    /* ── spinner ── */
    .spin {
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #0A0A0B;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">

    <div class="logo-wrap">
      <img src="/static/assets/PantheonLogoGold.png" alt="Pantheon" class="logo-img">
      <div>
        <div class="logo-text">PANTHEON</div>
        <div class="logo-sub">Life Safety OS</div>
      </div>
    </div>

    <!-- Step 1: Email + Password -->
    <div id="pwStep">
      <h1>Sign in</h1>
      <p class="sub">Enter your credentials to access the platform.</p>

      <div id="pwMsg" class="msg"></div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="pwInput" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn" id="signInBtn" onclick="doSignIn()">
        <span id="signInLabel">Sign In</span>
        <div class="spin" id="signInSpin"></div>
      </button>
    </div>

    <!-- Step 2: OTP (shown only when OTP_ENABLED=true on server) -->
    <div id="otpStep">
      <h1>Verify your identity</h1>
      <p class="sub" id="otpHint">A 6-digit code was sent to your phone.</p>

      <div id="otpMsg" class="msg"></div>

      <div class="field">
        <label>One-Time Code</label>
        <input type="text" id="otpInput" placeholder="000000" maxlength="6"
               autocomplete="one-time-code" inputmode="numeric">
      </div>

      <button class="btn" id="otpBtn" onclick="doVerifyOtp()">
        <span id="otpLabel">Verify Code</span>
        <div class="spin" id="otpSpin"></div>
      </button>

      <p style="text-align:center;margin-top:14px;font-size:12px;color:var(--muted)">
        Didn't receive it? <a href="#" onclick="doSignIn(true)" style="color:var(--gold)">Resend</a>
      </p>
    </div>

    <div class="footer">
      HCT + Embedded Logix &nbsp;·&nbsp; <a href="mailto:okapade@hct-world.com">Request access</a>
    </div>
  </div>
</div>

<script>
  // focus email on load
  document.getElementById('emailInput').focus();

  // enter key on password → sign in
  document.getElementById('pwInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSignIn();
  });
  document.getElementById('otpInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doVerifyOtp();
  });

  function showMsg(id, text, type) {
    var el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + type;
  }
  function clearMsg(id) {
    var el = document.getElementById(id);
    el.className = 'msg';
    el.textContent = '';
  }
  function setLoading(btnId, spinId, labelId, loading, labelText) {
    document.getElementById(btnId).disabled = loading;
    document.getElementById(spinId).style.display = loading ? 'block' : 'none';
    document.getElementById(labelId).style.display = loading ? 'none' : 'block';
    if (labelText) document.getElementById(labelId).textContent = labelText;
  }

  function doSignIn(resend) {
    clearMsg('pwMsg');
    var email = document.getElementById('emailInput').value.trim();
    var pw    = document.getElementById('pwInput').value;
    if (!email || !pw) { showMsg('pwMsg', 'Email and password are required.', 'error'); return; }

    setLoading('signInBtn', 'signInSpin', 'signInLabel', true);

    fetch('/api/auth/verify', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email: email, password: pw })
    })
    .then(r => r.json())
    .then(data => {
      setLoading('signInBtn', 'signInSpin', 'signInLabel', false, 'Sign In');
      if (data.error) {
        showMsg('pwMsg', data.error, 'error');
      } else if (data.otp_required) {
        // OTP step
        document.getElementById('pwStep').style.display = 'none';
        document.getElementById('otpStep').style.display = 'block';
        var hint = data.phone_hint ? 'Code sent to ' + data.phone_hint : 'Code sent to your phone.';
        document.getElementById('otpHint').textContent = hint;
        document.getElementById('otpInput').focus();
        if (resend) showMsg('otpMsg', 'New code sent.', 'info');
      } else if (data.ok) {
        window.location.href = '/';
      }
    })
    .catch(() => {
      setLoading('signInBtn', 'signInSpin', 'signInLabel', false, 'Sign In');
      showMsg('pwMsg', 'Connection error. Please try again.', 'error');
    });
  }

  function doVerifyOtp() {
    clearMsg('otpMsg');
    var code = document.getElementById('otpInput').value.trim();
    if (!code) { showMsg('otpMsg', 'Enter the 6-digit code.', 'error'); return; }

    setLoading('otpBtn', 'otpSpin', 'otpLabel', true);

    fetch('/api/auth/verify_otp', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ code: code })
    })
    .then(r => r.json())
    .then(data => {
      setLoading('otpBtn', 'otpSpin', 'otpLabel', false, 'Verify Code');
      if (data.error) {
        showMsg('otpMsg', data.error, 'error');
      } else if (data.ok) {
        window.location.href = '/';
      }
    })
    .catch(() => {
      setLoading('otpBtn', 'otpSpin', 'otpLabel', false, 'Verify Code');
      showMsg('otpMsg', 'Connection error. Please try again.', 'error');
    });
  }
</script>
</body>
</html>
