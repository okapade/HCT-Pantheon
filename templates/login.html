<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantheon — Sign In</title>
  <link rel="icon" type="image/png" href="/static/assets/PantheonLogoGold.png">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C8A84B; --gold2: #E2C46A;
      --bg: #0A0A0B; --bg2: #111113; --bg3: #18181C;
      --border: rgba(200,168,75,0.18);
      --text: #F0EDE8; --muted: #7A7670;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: linear-gradient(rgba(200,168,75,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(200,168,75,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .wrap { position: relative; z-index: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { width: 100%; max-width: 400px; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 40px 36px 36px; box-shadow: 0 0 80px rgba(200,168,75,0.06), 0 24px 48px rgba(0,0,0,0.5); }
    .logo-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .logo-img { width: 36px; height: 36px; object-fit: contain; }
    .logo-text { font-family: var(--mono); font-size: 15px; font-weight: 600; letter-spacing: 0.12em; color: var(--gold); }
    .logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 1px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
    .sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    input { width: 100%; height: 44px; background: var(--bg3); border: 1px solid rgba(255,255,255,0.08); border-radius: 7px; padding: 0 14px; font-family: var(--sans); font-size: 14px; color: var(--text); outline: none; transition: border-color 0.15s; }
    input:focus { border-color: rgba(200,168,75,0.5); }
    input::placeholder { color: var(--muted); }
    .btn { width: 100%; height: 46px; background: var(--gold); border: none; border-radius: 7px; font-family: var(--mono); font-size: 13px; font-weight: 600; letter-spacing: 0.08em; color: #0A0A0B; cursor: pointer; margin-top: 4px; transition: background 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn:hover { background: var(--gold2); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .msg { display: none; font-size: 13px; border-radius: 7px; padding: 10px 14px; margin-bottom: 16px; line-height: 1.45; }
    .msg.err  { display: block; background: rgba(224,85,85,0.12); border: 1px solid rgba(224,85,85,0.3); color: #F08080; }
    .msg.info { display: block; background: rgba(200,168,75,0.08); border: 1px solid rgba(200,168,75,0.2); color: var(--gold2); }
    .toggle { margin-top: 20px; text-align: center; font-size: 13px; color: var(--muted); }
    .toggle a { color: var(--gold); text-decoration: none; cursor: pointer; }
    .toggle a:hover { color: var(--gold2); }
    .spin { width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.3); border-top-color: #0A0A0B; border-radius: 50%; animation: sp 0.7s linear infinite; display: none; }
    @keyframes sp { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo-wrap">
      <img src="/static/assets/PantheonLogoGold.png" alt="Pantheon" class="logo-img">
      <div>
        <div class="logo-text">PANTHEON</div>
        <div class="logo-sub">Life Safety OS</div>
      </div>
    </div>

    <h1 id="heading">Sign in</h1>
    <p class="sub" id="subtext">Enter your credentials to access the platform.</p>

    <div id="msg" class="msg"></div>

    <div class="field" id="nameField" style="display:none">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Your name" autocomplete="name">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <div style="position:relative"><input type="password" id="pw" placeholder="••••••••" autocomplete="current-password" style="padding-right:44px"><button type="button" onclick="togglePw()" style="position:absolute;right:0;top:0;height:44px;width:44px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;display:flex;align-items:center;justify-content:center" id="eyeBtn">👁</button></div>
    </div>

    <button class="btn" id="btn" onclick="submit()">
      <span id="lbl">Sign In</span>
      <div class="spin" id="spin"></div>
    </button>

    <div class="toggle">
      <span id="toggleText">Don't have an account?</span>
      <a onclick="toggleMode()"> <span id="toggleLink">Create one</span></a>
    </div>
  </div>
</div>
<script>
  var mode = 'login'; // 'login' or 'signup'

  document.getElementById('email').focus();
  document.getElementById('pw').addEventListener('keydown', function(e){ if(e.key==='Enter') submit(); });
  document.getElementById('name') && document.getElementById('name').addEventListener('keydown', function(e){ if(e.key==='Enter') submit(); });

  function toggleMode() {
    mode = mode === 'login' ? 'signup' : 'login';
    clearMsg();
    if (mode === 'signup') {
      document.getElementById('heading').textContent   = 'Create account';
      document.getElementById('subtext').textContent   = 'Set up your Pantheon access.';
      document.getElementById('lbl').textContent       = 'Create Account';
      document.getElementById('toggleText').textContent = 'Already have an account?';
      document.getElementById('toggleLink').textContent = 'Sign in';
      document.getElementById('nameField').style.display = '';
      document.getElementById('name').focus();
    } else {
      document.getElementById('heading').textContent   = 'Sign in';
      document.getElementById('subtext').textContent   = 'Enter your credentials to access the platform.';
      document.getElementById('lbl').textContent       = 'Sign In';
      document.getElementById('toggleText').textContent = "Don't have an account?";
      document.getElementById('toggleLink').textContent = 'Create one';
      document.getElementById('nameField').style.display = 'none';
      document.getElementById('email').focus();
    }
  }

  function showMsg(text, type) {
    var el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }
  function clearMsg() {
    var el = document.getElementById('msg');
    el.className = 'msg';
    el.textContent = '';
  }

  function setLoading(on) {
    document.getElementById('btn').disabled = on;
    document.getElementById('lbl').style.display = on ? 'none' : '';
    document.getElementById('spin').style.display = on ? 'block' : 'none';
  }

  function submit() {
    clearMsg();
    var email = document.getElementById('email').value.trim();
    var pw    = document.getElementById('pw').value;
    if (!email || !pw) { showMsg('Email and password are required.', 'err'); return; }
    if (mode === 'signup' && pw.length < 8) { showMsg('Password must be at least 8 characters.', 'err'); return; }

    setLoading(true);
    var endpoint = mode === 'login' ? '/api/auth/verify' : '/api/auth/register';
    var body = { email: email, password: pw };
    if (mode === 'signup') body.name = document.getElementById('name').value.trim();

    fetch(endpoint, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      setLoading(false);
      if (d.ok) { window.location.href = '/'; return; }
      showMsg(d.error || 'Something went wrong.', 'err');
    })
    .catch(function(){
      setLoading(false);
      showMsg('Connection error. Please try again.', 'err');
    });
  }
  function togglePw() {
    var inp = document.getElementById("pw");
    var btn = document.getElementById("eyeBtn");
    if (inp.type === "password") { inp.type = "text"; btn.textContent = "🙈"; }
    else { inp.type = "password"; btn.textContent = "👁"; }
  }
</script>
</body>
</html>
