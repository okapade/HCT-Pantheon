<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantheon — Sign In</title>
  <link rel="icon" type="image/png" href="/static/assets/PantheonLogoGold.png">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C8A84B; --gold2: #E2C46A;
      --bg: #0A0A0B; --bg2: #111113; --bg3: #18181C;
      --border: rgba(200,168,75,0.18);
      --text: #F0EDE8; --muted: #7A7670;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: linear-gradient(rgba(200,168,75,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(200,168,75,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .wrap { position: relative; z-index: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { width: 100%; max-width: 400px; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 40px 36px 36px; box-shadow: 0 0 80px rgba(200,168,75,0.06), 0 24px 48px rgba(0,0,0,0.5); }
    .logo-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .logo-img { width: 36px; height: 36px; object-fit: contain; }
    .logo-text { font-family: var(--mono); font-size: 15px; font-weight: 600; letter-spacing: 0.12em; color: var(--gold); }
    .logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 1px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
    .sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    input { width: 100%; height: 44px; background: var(--bg3); border: 1px solid rgba(255,255,255,0.08); border-radius: 7px; padding: 0 14px; font-family: var(--sans); font-size: 14px; color: var(--text); outline: none; transition: border-color 0.15s; }
    input:focus { border-color: rgba(200,168,75,0.5); }
    input::placeholder { color: var(--muted); }
    .btn { width: 100%; height: 46px; background: var(--gold); border: none; border-radius: 7px; font-family: var(--mono); font-size: 13px; font-weight: 600; letter-spacing: 0.08em; color: #0A0A0B; cursor: pointer; margin-top: 8px; transition: background 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn:hover { background: var(--gold2); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .err { display: none; font-size: 13px; border-radius: 7px; padding: 10px 14px; margin-bottom: 16px; background: rgba(224,85,85,0.12); border: 1px solid rgba(224,85,85,0.3); color: #F08080; line-height: 1.45; }
    .err.show { display: block; }
    .spin { width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.3); border-top-color: #0A0A0B; border-radius: 50%; animation: sp 0.7s linear infinite; display: none; }
    @keyframes sp { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo-wrap">
      <img src="/static/assets/PantheonLogoGold.png" alt="Pantheon" class="logo-img">
      <div>
        <div class="logo-text">PANTHEON</div>
        <div class="logo-sub">Life Safety OS</div>
      </div>
    </div>
    <h1>Sign in</h1>
    <p class="sub">Enter your credentials to access the platform.</p>
    <div id="err" class="err"></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn" id="btn" onclick="signIn()">
      <span id="lbl">Sign In</span>
      <div class="spin" id="spin"></div>
    </button>
  </div>
</div>
<script>
  document.getElementById('email').focus();
  document.getElementById('pw').addEventListener('keydown', function(e){ if(e.key==='Enter') signIn(); });

  function signIn() {
    var email = document.getElementById('email').value.trim();
    var pw    = document.getElementById('pw').value;
    var err   = document.getElementById('err');
    err.classList.remove('show');
    if (!email || !pw) { err.textContent = 'Email and password are required.'; err.classList.add('show'); return; }
    document.getElementById('btn').disabled = true;
    document.getElementById('lbl').style.display = 'none';
    document.getElementById('spin').style.display = 'block';
    fetch('/api/auth/verify', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email: email, password: pw })
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.ok) { window.location.href = '/'; return; }
      err.textContent = d.error || 'Invalid credentials.';
      err.classList.add('show');
      document.getElementById('btn').disabled = false;
      document.getElementById('lbl').style.display = '';
      document.getElementById('spin').style.display = 'none';
    })
    .catch(function(){
      err.textContent = 'Connection error. Please try again.';
      err.classList.add('show');
      document.getElementById('btn').disabled = false;
      document.getElementById('lbl').style.display = '';
      document.getElementById('spin').style.display = 'none';
    });
  }
</script>
</body>
</html>
