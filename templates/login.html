<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantheon — Sign In</title>
  <link rel="icon" type="image/png" href="/static/assets/PantheonLogoGold.png">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

    :root {
      --bg:    #0d0d0d;
      --s0:    #161616;
      --s1:    #1f1f1f;
      --s2:    #2a2a2a;
      --b0:    #2e2e2e;
      --b1:    #3a3a3a;
      --t0:    #f0eeea;
      --t1:    #c8c4bc;
      --t2:    #9a958d;
      --t3:    #616069;
      --acc:   #f0eeea;
      --red:   #e05050;
      --red-bg:#2a1515;
      --sans:  'IBM Plex Sans', system-ui, sans-serif;
      --mono:  'IBM Plex Mono', monospace;
      --r:     12px;
      --r-sm:  8px;
    }
    .light {
      --bg:  #f0eeea;
      --s0:  #fff;
      --s1:  #f5f3ef;
      --s2:  #ece9e4;
      --b0:  #dedad4;
      --b1:  #ccc8c0;
      --t0:  #0d0d0d;
      --t1:  #3a3836;
      --t2:  #6e6a63;
      --t3:  #9a968f;
      --acc: #1a1a1a;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--t0);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: background .2s, color .2s;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: var(--s0);
      border: 1px solid var(--b0);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 8px 32px rgba(0,0,0,.24);
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo-img { width: 28px; height: 28px; object-fit: contain }
    .logo-name { font: 600 15px/1 var(--mono); color: var(--t0); letter-spacing: .5px }
    .logo-divider { width: 1px; height: 16px; background: var(--b1); margin: 0 4px }
    .logo-sub { font: 400 11px/1 var(--sans); color: var(--t3); letter-spacing: 2px; text-transform: uppercase }

    h1 { font: 700 26px/1.1 var(--sans); letter-spacing: -.4px; margin-bottom: 6px }
    .subtitle { font: 400 13.5px/1 var(--sans); color: var(--t2); margin-bottom: 28px }

    .error-banner {
      background: var(--red-bg);
      border: 1px solid var(--red);
      border-radius: var(--r-sm);
      color: var(--red);
      font: 400 13px/1.5 var(--sans);
      padding: 10px 14px;
      margin-bottom: 16px;
      display: none;
    }
    .error-banner.visible { display: block }

    .field { margin-bottom: 16px }
    .field label {
      display: block;
      font: 500 10px/1 var(--mono);
      letter-spacing: 2.5px;
      color: var(--t3);
      text-transform: uppercase;
      margin-bottom: 7px;
    }
    .field input {
      width: 100%;
      background: var(--s1);
      border: 1px solid var(--b0);
      border-radius: var(--r-sm);
      color: var(--t0);
      font: 400 14px/1 var(--sans);
      padding: 13px 14px;
      outline: none;
      transition: border-color .14s;
      -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--t2) }
    .field input::placeholder { color: var(--t3) }

    .pw-wrap { position: relative }
    .pw-wrap input { padding-right: 44px }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--t3);
      padding: 4px; line-height: 0;
    }
    .pw-toggle:hover { color: var(--t1) }

    .row-between {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    /* Remember me checkbox */
    .remember-label {
      display: flex; align-items: center; gap: 8px;
      font: 400 13px/1 var(--sans); color: var(--t2); cursor: pointer;
    }
    .remember-label input[type="checkbox"] {
      width: 16px; height: 16px; cursor: pointer;
      accent-color: var(--t0); border-radius: 4px;
    }
    .forgot-link {
      font: 400 13px/1 var(--sans); color: var(--t2);
      text-decoration: none; transition: color .12s;
    }
    .forgot-link:hover { color: var(--t0) }

    .btn-primary {
      width: 100%;
      background: var(--t0);
      color: var(--bg);
      border: none;
      border-radius: var(--r-sm);
      font: 600 14px/1 var(--sans);
      letter-spacing: .3px;
      padding: 14px;
      cursor: pointer;
      transition: opacity .14s, transform .14s;
      margin-bottom: 20px;
    }
    .btn-primary:hover { opacity: .88; transform: translateY(-1px) }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none }

    .create-link {
      text-align: center;
      font: 400 13px/1 var(--sans);
      color: var(--t2);
    }
    .create-link a {
      color: var(--t0);
      font-weight: 500;
      text-decoration: none;
      border-bottom: 1px solid var(--b1);
      padding-bottom: 1px;
    }
    .create-link a:hover { border-color: var(--t0) }

    /* Theme toggle */
    .theme-bar {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 6px;
    }
    .theme-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 7px 14px;
      background: var(--s1); border: 1px solid var(--b0); border-radius: 99px;
      font: 500 11px/1 var(--sans); letter-spacing: .5px; color: var(--t2);
      cursor: pointer; transition: all .14s;
    }
    .theme-btn.active { background: var(--s2); border-color: var(--b1); color: var(--t0) }
    .theme-btn svg { width: 13px; height: 13px }
  </style>
</head>
<body class="dark" id="body">

  <div class="card">
    <div class="logo-row">
      <img src="/static/assets/PantheonLogoGold.png" alt="Pantheon" class="logo-img">
      <span class="logo-name">PANTHEON</span>
      <div class="logo-divider"></div>
      <span class="logo-sub">Life Safety OS</span>
    </div>

    <h1>Sign in</h1>
    <p class="subtitle">Welcome back. Access your Pantheon workspace.</p>

    <div class="error-banner" id="errorBanner"></div>

    <div class="field">
      <label for="emailInput">Email</label>
      <input type="email" id="emailInput" name="email"
             placeholder="you@organization.com"
             autocomplete="email"
             spellcheck="false">
    </div>

    <div class="field">
      <label for="passwordInput">Password</label>
      <div class="pw-wrap">
        <input type="password" id="passwordInput" name="password"
               autocomplete="current-password"
               placeholder="••••••••••••">
        <button class="pw-toggle" type="button" id="pwToggle" aria-label="Show password">
          <svg id="pwEye" width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4">
            <path d="M1 10s3.6-6 9-6 9 6 9 6-3.6 6-9 6-9-6-9-6z"/>
            <circle cx="10" cy="10" r="2.5"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="row-between">
      <label class="remember-label">
        <input type="checkbox" id="rememberMe" name="remember_me">
        Remember me
      </label>
      <a href="/forgot-password" class="forgot-link">Forgot password?</a>
    </div>

    <button class="btn-primary" id="signInBtn" onclick="handleSignIn()">Sign In</button>

    <p class="create-link">No account? <a href="/register">Create one</a></p>
  </div>

  <div class="theme-bar">
    <button class="theme-btn" id="btnLight" onclick="setTheme('light')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4">
        <circle cx="10" cy="10" r="4"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.3 4.3l1.4 1.4M14.3 14.3l1.4 1.4M4.3 15.7l1.4-1.4M14.3 5.7l1.4-1.4"/>
      </svg>
      LIGHT
    </button>
    <button class="theme-btn active" id="btnDark" onclick="setTheme('dark')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4">
        <path d="M17.3 11.3A8 8 0 118.7 2.7a6 6 0 008.6 8.6z"/>
      </svg>
      DARK
    </button>
  </div>

<script>
// ── Theme ────────────────────────────────────────────────────────────────────
function setTheme(t) {
  document.getElementById('body').className = t;
  document.getElementById('btnLight').classList.toggle('active', t === 'light');
  document.getElementById('btnDark').classList.toggle('active', t === 'dark');
  try { localStorage.setItem('pantheon_theme', t); } catch(e) {}
}
(function initTheme() {
  var t = 'dark';
  try { t = localStorage.getItem('pantheon_theme') || 'dark'; } catch(e) {}
  setTheme(t);
})();

// ── Password toggle ──────────────────────────────────────────────────────────
document.getElementById('pwToggle').addEventListener('click', function() {
  var inp = document.getElementById('passwordInput');
  inp.type = inp.type === 'password' ? 'text' : 'password';
});

// ── Restore remembered credentials ──────────────────────────────────────────
(function restoreRemembered() {
  try {
    var savedEmail = localStorage.getItem('pantheon_saved_email');
    var savedPw    = localStorage.getItem('pantheon_saved_pw');
    var remember   = localStorage.getItem('pantheon_remember');
    // Support both storage formats
    if (!savedEmail) {
      try {
        var legacyData = JSON.parse(remember || '{}');
        if (legacyData && legacyData.email) savedEmail = legacyData.email;
      } catch(e) {}
    }
    if (savedEmail) {
      document.getElementById('emailInput').value = savedEmail;
      document.getElementById('rememberMe').checked = true;
    }
    if (savedEmail && savedPw && remember === 'true') {
      document.getElementById('passwordInput').value = savedPw;
    }
  } catch(e) {}
})();

// ── Sign-in handler ──────────────────────────────────────────────────────────
function handleSignIn() {
  var email    = document.getElementById('emailInput').value.trim().toLowerCase();
  var password = document.getElementById('passwordInput').value;
  var remember = document.getElementById('rememberMe').checked;
  var btn      = document.getElementById('signInBtn');
  var banner   = document.getElementById('errorBanner');

  // Clear error
  banner.classList.remove('visible');

  // Validate
  if (!email || !email.includes('@')) {
    showError('Please enter a valid email address.');
    return;
  }
  if (!password) {
    showError('Please enter your password.');
    return;
  }

  // Disable button
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  fetch('/api/auth/verify', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify({ email: email, password: password, remember_me: remember })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.ok) {
      // Save remember-me credentials
      if (remember) {
        try {
          localStorage.setItem('pantheon_saved_email', email);
          localStorage.setItem('pantheon_saved_pw', password);
          localStorage.setItem('pantheon_remember', 'true');
        } catch(e) {}
      } else {
        try {
          localStorage.removeItem('pantheon_saved_email');
          localStorage.removeItem('pantheon_saved_pw');
          localStorage.removeItem('pantheon_remember');
        } catch(e) {}
      }
      // Log login event to Sheets
      logLoginEvent(email, data.name || '');
      // Redirect
      window.location.href = data.redirect || '/dashboard';
    } else if (data.error === 'email_not_verified') {
      btn.disabled = false;
      btn.textContent = 'Sign In';
      // Show inline resend option
      var banner = document.getElementById('errorBanner');
      banner.innerHTML = 'Email not verified. <a href="#" onclick="resendVerify(\''+email+'\');return false;" style="color:var(--red);font-weight:600;text-decoration:underline">Resend link</a>';
      banner.classList.add('visible');
    } else {
      btn.disabled = false;
      btn.textContent = 'Sign In';
      showError(data.error || 'Incorrect email or password');
    }
  })
  .catch(function() {
    btn.disabled = false;
    btn.textContent = 'Sign In';
    showError('Unable to connect. Please try again.');
  });
}


function resendVerify(email) {
  fetch('/api/auth/resend_otp', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify({ email: email })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.ok) showError('Verification email sent — check your inbox.');
    else showError('Failed to send. Try again shortly.');
  })
  .catch(function() { showError('Network error. Try again.'); });
}

function showError(msg) {
  var b = document.getElementById('errorBanner');
  b.textContent = msg;
  b.classList.add('visible');
}

// ── Log login to Sheets (fire-and-forget) ───────────────────────────────────
function logLoginEvent(email, name) {
  try {
    fetch('/api/log-event', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        tab: 'Activity Log',
        data: {
          timestamp: new Date().toISOString(),
          user:      email,
          action:    'login',
          detail:    name ? 'Signed in — ' + name : 'Signed in',
        }
      })
    }).catch(function() {});

    // Also update Last Login in Users sheet
    fetch('/api/log-event', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        tab: 'Users',
        data: {
          action:     'last_login_update',
          email:      email,
          name:       name,
          last_login: new Date().toISOString(),
        }
      })
    }).catch(function() {});
  } catch(e) {}
}

// ── Enter key submits ────────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleSignIn();
});
</script>
</body>
</html>
