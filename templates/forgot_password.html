<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantheon — Reset Password</title>
  <link rel="icon" type="image/png" href="/static/assets/PantheonLogoGold.png">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

    :root {
      --bg:    #0d0d0d;
      --s0:    #161616;
      --s1:    #1f1f1f;
      --s2:    #2a2a2a;
      --b0:    #2e2e2e;
      --b1:    #3a3a3a;
      --t0:    #f0eeea;
      --t1:    #c8c4bc;
      --t2:    #9a958d;
      --t3:    #616069;
      --acc:   #f0eeea;
      --red:   #e05050;
      --red-bg:#2a1515;
      --green: #22c55e;
      --green-bg: #0d2b1a;
      --sans:  'IBM Plex Sans', system-ui, sans-serif;
      --mono:  'IBM Plex Mono', monospace;
      --r:     12px;
      --r-sm:  8px;
    }
    .light {
      --bg:  #f0eeea;
      --s0:  #fff;
      --s1:  #f5f3ef;
      --s2:  #ece9e4;
      --b0:  #dedad4;
      --b1:  #ccc8c0;
      --t0:  #0d0d0d;
      --t1:  #3a3836;
      --t2:  #6e6a63;
      --t3:  #9a968f;
      --acc: #1a1a1a;
      --green-bg: #dcfce7;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--t0);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: background .2s, color .2s;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: var(--s0);
      border: 1px solid var(--b0);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 8px 32px rgba(0,0,0,.24);
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo-img { width: 28px; height: 28px; object-fit: contain }
    .logo-name { font: 600 15px/1 var(--mono); color: var(--t0); letter-spacing: .5px }
    .logo-divider { width: 1px; height: 16px; background: var(--b1); margin: 0 4px }
    .logo-sub { font: 400 11px/1 var(--sans); color: var(--t3); letter-spacing: 2px; text-transform: uppercase }

    h1 { font: 700 26px/1.1 var(--sans); letter-spacing: -.4px; margin-bottom: 6px }
    .subtitle { font: 400 13.5px/1.4 var(--sans); color: var(--t2); margin-bottom: 28px }

    /* Error / success banners */
    .banner {
      padding: 12px 15px;
      border-radius: var(--r-sm);
      font: 500 13px/1.4 var(--sans);
      margin-bottom: 18px;
      display: none;
    }
    .banner.visible { display: block }
    .banner.error   { background: var(--red-bg); border: 1px solid rgba(224,80,80,.25); color: var(--red) }
    .banner.success { background: var(--green-bg); border: 1px solid rgba(34,197,94,.2); color: var(--green) }

    /* Form */
    .field { margin-bottom: 16px }
    .field label { display: block; font: 500 10.5px/1 var(--mono); letter-spacing: 1.5px; color: var(--t2); text-transform: uppercase; margin-bottom: 7px }
    .field input {
      width: 100%; height: 48px;
      background: var(--s1); border: 1px solid var(--b1);
      border-radius: var(--r); padding: 0 14px;
      font: 400 14px/1 var(--sans); color: var(--t0);
      outline: none; transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus { border-color: var(--t2); box-shadow: 0 0 0 3px rgba(255,255,255,.04) }
    .field input::placeholder { color: var(--t3) }

    .btn {
      width: 100%; height: 50px; margin-top: 4px;
      background: var(--t0); color: var(--bg);
      border: none; border-radius: var(--r);
      font: 600 14px/1 var(--sans);
      cursor: pointer; transition: opacity .15s;
    }
    .btn:hover { opacity: .88 }
    .btn:disabled { opacity: .4; cursor: not-allowed }

    /* Sent state */
    .sent-state { display: none; text-align: center; padding: 8px 0 }
    .sent-state.visible { display: block }
    .sent-icon {
      width: 52px; height: 52px; margin: 0 auto 16px;
      background: var(--green-bg); border: 1px solid rgba(34,197,94,.2);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .sent-title { font: 700 20px/1.2 var(--sans); color: var(--t0); margin-bottom: 8px }
    .sent-sub   { font: 400 13.5px/1.6 var(--sans); color: var(--t2); margin-bottom: 24px }
    .sent-email { font: 600 14px/1 var(--sans); color: var(--t0) }

    .resend-row { margin-top: 18px; font: 400 13px/1 var(--sans); color: var(--t3); text-align: center }
    .resend-btn { background: none; border: none; color: var(--t1); font: 500 13px/1 var(--sans); cursor: pointer; text-decoration: underline; text-underline-offset: 3px }
    .resend-btn:disabled { opacity: .45; cursor: not-allowed }

    .back-link {
      display: flex; align-items: center; gap: 6px;
      margin-top: 24px; text-align: center; justify-content: center;
      font: 500 13px/1 var(--sans); color: var(--t2);
      text-decoration: none; transition: color .15s;
    }
    .back-link:hover { color: var(--t0) }

    /* Theme toggle */
    .theme-row {
      display: flex; gap: 8px; margin-top: 24px;
      justify-content: center;
    }
    .theme-btn {
      padding: 6px 14px; border-radius: 99px;
      border: 1px solid var(--b1); background: transparent;
      font: 500 11px/1 var(--mono); color: var(--t3);
      cursor: pointer; display: flex; align-items: center; gap: 5px;
      transition: all .15s;
    }
    .theme-btn.active { background: var(--s1); color: var(--t0); border-color: var(--b1) }
  </style>
</head>
<body>

<div class="card">
  <div class="logo-row">
    <img class="logo-img" src="/static/assets/PantheonLogoGold.png" alt="Pantheon">
    <span class="logo-name">PANTHEON</span>
    <div class="logo-divider"></div>
    <span class="logo-sub">Life Safety OS</span>
  </div>

  <!-- Form state -->
  <div id="formState">
    <h1>Forgot password?</h1>
    <p class="subtitle">Enter your email and we'll send you a reset link.</p>

    <div class="banner error" id="errorBanner"></div>

    <div class="field">
      <label for="emailInput">Email</label>
      <input type="email" id="emailInput" placeholder="you@company.com" autocomplete="email">
    </div>

    <button class="btn" id="submitBtn" onclick="handleSubmit()">Send reset link</button>

    <a class="back-link" href="/login">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 2L4 7l5 5"/>
      </svg>
      Back to sign in
    </a>
  </div>

  <!-- Sent state -->
  <div class="sent-state" id="sentState">
    <div class="sent-icon">✉️</div>
    <div class="sent-title">Check your inbox</div>
    <div class="sent-sub">We sent a password reset link to<br><span class="sent-email" id="sentEmail"></span></div>
    <p style="font:400 12.5px/1.6 var(--sans); color:var(--t3)">
      Didn't get it? Check your spam folder or resend below.
    </p>
    <div class="resend-row">
      <button class="resend-btn" id="resendBtn" onclick="handleResend()">Resend email</button>
      <span id="cooldownMsg" style="display:none"> — wait <span id="cooldownSec">30</span>s</span>
    </div>
    <a class="back-link" href="/login">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 2L4 7l5 5"/>
      </svg>
      Back to sign in
    </a>
  </div>
</div>

<div class="theme-row">
  <button class="theme-btn" id="btnLight" onclick="setTheme('light')">☀ Light</button>
  <button class="theme-btn active" id="btnDark" onclick="setTheme('dark')">🌙 Dark</button>
</div>

<script>
  // ── Theme ────────────────────────────────────────────────────────────────────
  function setTheme(t) {
    document.body.className = t === 'light' ? 'light' : '';
    document.getElementById('btnLight').classList.toggle('active', t === 'light');
    document.getElementById('btnDark').classList.toggle('active', t !== 'light');
    try { localStorage.setItem('pantheon_theme', t); } catch(e) {}
  }
  (function() {
    var saved = 'dark';
    try { saved = localStorage.getItem('pantheon_theme') || 'dark'; } catch(e) {}
    setTheme(saved);
  })();

  // ── Submit ───────────────────────────────────────────────────────────────────
  var submittedEmail = '';

  function showError(msg) {
    var b = document.getElementById('errorBanner');
    b.textContent = msg; b.className = 'banner error visible';
  }

  function handleSubmit() {
    var email = document.getElementById('emailInput').value.trim().toLowerCase();
    var btn   = document.getElementById('submitBtn');
    var errBn = document.getElementById('errorBanner');
    errBn.className = 'banner error';

    if (!email || !email.includes('@')) {
      showError('Please enter a valid email address.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Sending…';

    fetch('/api/auth/forgot_password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      // Always show success (don't reveal if email exists)
      submittedEmail = email;
      document.getElementById('formState').style.display = 'none';
      document.getElementById('sentEmail').textContent = email;
      document.getElementById('sentState').className = 'sent-state visible';
      startCooldown();
    })
    .catch(function() {
      showError('Something went wrong. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Send reset link';
    });
  }

  // Allow pressing Enter
  document.getElementById('emailInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleSubmit();
  });

  // ── Resend cooldown ──────────────────────────────────────────────────────────
  var cooldownTimer = null;

  function startCooldown() {
    var btn  = document.getElementById('resendBtn');
    var msg  = document.getElementById('cooldownMsg');
    var sec  = document.getElementById('cooldownSec');
    var left = 30;
    btn.disabled = true;
    msg.style.display = 'inline';
    sec.textContent = left;
    cooldownTimer = setInterval(function() {
      left--;
      sec.textContent = left;
      if (left <= 0) {
        clearInterval(cooldownTimer);
        btn.disabled = false;
        msg.style.display = 'none';
      }
    }, 1000);
  }

  function handleResend() {
    if (!submittedEmail) return;
    document.getElementById('resendBtn').disabled = true;
    fetch('/api/auth/forgot_password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: submittedEmail })
    }).then(function() { startCooldown(); }).catch(function() {
      document.getElementById('resendBtn').disabled = false;
    });
  }
</script>
</body>
</html>
