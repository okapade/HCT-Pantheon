<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantheon — Set New Password</title>
  <link rel="icon" type="image/png" href="/static/assets/PantheonLogoGold.png">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

    :root {
      --bg:    #0d0d0d;
      --s0:    #161616;
      --s1:    #1f1f1f;
      --s2:    #2a2a2a;
      --b0:    #2e2e2e;
      --b1:    #3a3a3a;
      --t0:    #f0eeea;
      --t1:    #c8c4bc;
      --t2:    #9a958d;
      --t3:    #616069;
      --acc:   #f0eeea;
      --red:   #e05050;
      --red-bg:#2a1515;
      --green: #22c55e;
      --green-bg: #0d2b1a;
      --sans:  'IBM Plex Sans', system-ui, sans-serif;
      --mono:  'IBM Plex Mono', monospace;
      --r:     12px;
      --r-sm:  8px;
    }
    .light {
      --bg:  #f0eeea; --s0: #fff; --s1: #f5f3ef; --s2: #ece9e4;
      --b0:  #dedad4; --b1: #ccc8c0;
      --t0:  #0d0d0d; --t1: #3a3836; --t2: #6e6a63; --t3: #9a968f;
      --acc: #1a1a1a; --green-bg: #dcfce7;
    }
    body {
      font-family: var(--sans); background: var(--bg); color: var(--t0);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
      transition: background .2s, color .2s;
    }
    .card {
      width: 100%; max-width: 440px;
      background: var(--s0); border: 1px solid var(--b0);
      border-radius: 20px; padding: 40px;
      box-shadow: 0 8px 32px rgba(0,0,0,.24);
    }
    .logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 28px }
    .logo-img { width: 28px; height: 28px; object-fit: contain }
    .logo-name { font: 600 15px/1 var(--mono); color: var(--t0); letter-spacing: .5px }
    .logo-divider { width: 1px; height: 16px; background: var(--b1); margin: 0 4px }
    .logo-sub { font: 400 11px/1 var(--sans); color: var(--t3); letter-spacing: 2px; text-transform: uppercase }
    h1 { font: 700 26px/1.1 var(--sans); letter-spacing: -.4px; margin-bottom: 6px }
    .subtitle { font: 400 13.5px/1.4 var(--sans); color: var(--t2); margin-bottom: 28px }
    .banner { padding: 12px 15px; border-radius: var(--r-sm); font: 500 13px/1.4 var(--sans); margin-bottom: 18px; display: none }
    .banner.visible { display: block }
    .banner.error   { background: var(--red-bg); border: 1px solid rgba(224,80,80,.25); color: var(--red) }
    .banner.success { background: var(--green-bg); border: 1px solid rgba(34,197,94,.2); color: var(--green) }
    .field { margin-bottom: 16px }
    .field label { display: block; font: 500 10.5px/1 var(--mono); letter-spacing: 1.5px; color: var(--t2); text-transform: uppercase; margin-bottom: 7px }
    .pw-wrap { position: relative }
    .field input {
      width: 100%; height: 48px;
      background: var(--s1); border: 1px solid var(--b1);
      border-radius: var(--r); padding: 0 44px 0 14px;
      font: 400 14px/1 var(--sans); color: var(--t0);
      outline: none; transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus { border-color: var(--t2); box-shadow: 0 0 0 3px rgba(255,255,255,.04) }
    .field input::placeholder { color: var(--t3) }
    .pw-eye {
      position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--t3);
      padding: 4px; line-height: 1;
    }
    .strength-bar { height: 3px; border-radius: 99px; background: var(--b0); margin-top: 8px; overflow: hidden }
    .strength-fill { height: 100%; border-radius: 99px; width: 0; transition: width .3s, background .3s }
    .strength-label { font: 400 11px/1 var(--sans); color: var(--t3); margin-top: 5px }
    .btn {
      width: 100%; height: 50px; margin-top: 4px;
      background: var(--t0); color: var(--bg);
      border: none; border-radius: var(--r);
      font: 600 14px/1 var(--sans); cursor: pointer; transition: opacity .15s;
    }
    .btn:hover { opacity: .88 }
    .btn:disabled { opacity: .4; cursor: not-allowed }
    /* Expired state */
    .expired-state { text-align: center; padding: 8px 0 }
    .expired-icon { font-size: 36px; margin-bottom: 16px }
    .back-link {
      display: flex; align-items: center; gap: 6px; margin-top: 24px;
      justify-content: center; font: 500 13px/1 var(--sans); color: var(--t2);
      text-decoration: none; transition: color .15s;
    }
    .back-link:hover { color: var(--t0) }
    .theme-row { display: flex; gap: 8px; margin-top: 24px; justify-content: center }
    .theme-btn {
      padding: 6px 14px; border-radius: 99px; border: 1px solid var(--b1);
      background: transparent; font: 500 11px/1 var(--mono); color: var(--t3);
      cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all .15s;
    }
    .theme-btn.active { background: var(--s1); color: var(--t0); border-color: var(--b1) }
  </style>
</head>
<body>

<div class="card">
  <div class="logo-row">
    <img class="logo-img" src="/static/assets/PantheonLogoGold.png" alt="Pantheon">
    <span class="logo-name">PANTHEON</span>
    <div class="logo-divider"></div>
    <span class="logo-sub">Life Safety OS</span>
  </div>

  <!-- Valid token — show reset form -->
  <div id="formState" style="display:none">
    <h1>Set new password</h1>
    <p class="subtitle">Choose a strong password for your account.</p>

    <div class="banner error" id="errorBanner"></div>
    <div class="banner success" id="successBanner"></div>

    <div class="field">
      <label for="pw1">New password</label>
      <div class="pw-wrap">
        <input type="password" id="pw1" placeholder="Min. 8 characters" autocomplete="new-password" oninput="checkStrength()">
        <button class="pw-eye" type="button" onclick="togglePw('pw1',this)" aria-label="Show password">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-label" id="strengthLabel"></div>
    </div>

    <div class="field">
      <label for="pw2">Confirm password</label>
      <div class="pw-wrap">
        <input type="password" id="pw2" placeholder="Same password again" autocomplete="new-password">
        <button class="pw-eye" type="button" onclick="togglePw('pw2',this)" aria-label="Show password">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button class="btn" id="submitBtn" onclick="handleReset()">Set new password</button>

    <a class="back-link" href="/login">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 2L4 7l5 5"/></svg>
      Back to sign in
    </a>
  </div>

  <!-- Invalid / expired token -->
  <div class="expired-state" id="expiredState" style="display:none">
    <div class="expired-icon">⏱</div>
    <h1 style="margin-bottom:10px">Link expired</h1>
    <p class="subtitle">This reset link has expired or already been used. Request a new one below.</p>
    <a href="/forgot-password" style="display:block">
      <button class="btn" style="margin-top:0">Request new link</button>
    </a>
    <a class="back-link" href="/login">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 2L4 7l5 5"/></svg>
      Back to sign in
    </a>
  </div>
</div>

<div class="theme-row">
  <button class="theme-btn" id="btnLight" onclick="setTheme('light')">☀ Light</button>
  <button class="theme-btn active" id="btnDark" onclick="setTheme('dark')">🌙 Dark</button>
</div>

<script>
  var TOKEN = '{{ token | default("") }}';
  // Show correct state based on token presence
  if (TOKEN && TOKEN.length > 10) {
    document.getElementById('formState').style.display = 'block';
  } else {
    document.getElementById('expiredState').style.display = 'block';
  }

  function setTheme(t) {
    document.body.className = t === 'light' ? 'light' : '';
    document.getElementById('btnLight').classList.toggle('active', t === 'light');
    document.getElementById('btnDark').classList.toggle('active', t !== 'light');
    try { localStorage.setItem('pantheon_theme', t); } catch(e) {}
  }
  (function() {
    var saved = 'dark';
    try { saved = localStorage.getItem('pantheon_theme') || 'dark'; } catch(e) {}
    setTheme(saved);
  })();

  function togglePw(id, btn) {
    var inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  function checkStrength() {
    var pw   = document.getElementById('pw1').value;
    var fill = document.getElementById('strengthFill');
    var lbl  = document.getElementById('strengthLabel');
    var score = 0;
    if (pw.length >= 8)  score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    var levels = [
      { w:'20%', c:'#e05050', l:'' },
      { w:'40%', c:'#e05050', l:'Weak' },
      { w:'60%', c:'#f59e0b', l:'Fair' },
      { w:'80%', c:'#22c55e', l:'Good' },
      { w:'100%',c:'#22c55e', l:'Strong' }
    ];
    var lvl = levels[Math.min(score, 4)];
    fill.style.width = pw ? lvl.w : '0';
    fill.style.background = lvl.c;
    lbl.textContent = pw ? lvl.l : '';
  }

  function showError(msg) {
    var b = document.getElementById('errorBanner');
    b.textContent = msg; b.className = 'banner error visible';
    document.getElementById('successBanner').className = 'banner success';
  }

  function handleReset() {
    var pw1 = document.getElementById('pw1').value;
    var pw2 = document.getElementById('pw2').value;
    var btn = document.getElementById('submitBtn');

    document.getElementById('errorBanner').className = 'banner error';

    if (!pw1 || pw1.length < 8) { showError('Password must be at least 8 characters.'); return; }
    if (pw1 !== pw2) { showError('Passwords do not match.'); return; }

    btn.disabled = true;
    btn.textContent = 'Saving…';

    fetch('/api/auth/reset_password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: TOKEN, password: pw1 })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.ok) {
        var sb = document.getElementById('successBanner');
        sb.textContent = 'Password updated! Redirecting to sign in…';
        sb.className = 'banner success visible';
        document.getElementById('pw1').disabled = true;
        document.getElementById('pw2').disabled = true;
        btn.disabled = true;
        setTimeout(function() { window.location.href = '/login?msg=password_reset'; }, 2200);
      } else {
        showError(data.error || 'Something went wrong. Try requesting a new link.');
        btn.disabled = false;
        btn.textContent = 'Set new password';
      }
    })
    .catch(function() {
      showError('Connection error. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Set new password';
    });
  }

  // Enter key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && TOKEN) handleReset();
  });
</script>
</body>
</html>
