<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantheon — Reset Password</title>
  <link rel="icon" type="image/png" href="/static/assets/PantheonLogoGold.png">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --gold:#9A7A28; --gold2:#B8922E; --gold-pale:rgba(154,122,40,0.09); --gold-ring:rgba(154,122,40,0.18);
      --bg:#F4F2ED; --bg2:#FFFFFF; --bg3:#EDEAE3; --border:rgba(0,0,0,0.09); --border-focus:#9A7A28;
      --text:#111110; --sub:#4A4740; --muted:#8A8278;
      --red:#A83030; --red-bg:rgba(168,48,48,0.06); --red-border:rgba(168,48,48,0.18);
      --green:#2A7A4A; --green-bg:rgba(42,122,74,0.07); --green-border:rgba(42,122,74,0.2);
      --logo-filter:brightness(0); --logo-text:#111110;
      --grid:rgba(0,0,0,0.05);
      --shadow:0 2px 8px rgba(0,0,0,0.08),0 16px 48px rgba(0,0,0,0.07);
      --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
    }
    [data-theme="dark"] {
      --gold:#C8A84B; --gold2:#E2C46A; --gold-pale:rgba(200,168,75,0.12); --gold-ring:rgba(200,168,75,0.22);
      --bg:#0A0A0B; --bg2:#111113; --bg3:#17171A; --border:rgba(255,255,255,0.07); --border-focus:#C8A84B;
      --text:#F0EDE8; --sub:#A09890; --muted:#6A6460;
      --red:#E05555; --red-bg:rgba(224,85,85,0.08); --red-border:rgba(224,85,85,0.22);
      --green:#4CAF7D; --green-bg:rgba(76,175,125,0.08); --green-border:rgba(76,175,125,0.22);
      --logo-filter:none; --logo-text:#C8A84B; --grid:rgba(200,168,75,0.04);
      --shadow:0 2px 12px rgba(0,0,0,0.6),0 20px 60px rgba(0,0,0,0.5);
    }
    html,body { min-height:100%; background:var(--bg); color:var(--text); font-family:var(--sans); -webkit-font-smoothing:antialiased; transition:background 0.22s,color 0.22s; }
    body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:0; background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px); background-size:48px 48px; }
    .wrap { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px 80px; }
    .card { width:100%; max-width:520px; background:var(--bg2); border:1px solid var(--border); border-radius:18px; padding:48px 44px 40px; box-shadow:var(--shadow); transition:background 0.22s,border-color 0.22s; }
    .brand { display:flex; align-items:center; gap:10px; margin-bottom:32px; }
    .brand img { width:28px; height:28px; object-fit:contain; filter:var(--logo-filter); transition:filter 0.22s; }
    .brand-name { font-family:var(--mono); font-size:13px; font-weight:600; letter-spacing:0.14em; color:var(--logo-text); text-transform:uppercase; }
    .brand-sep { width:1px; height:14px; background:var(--border); margin:0 2px; }
    .brand-sub { font-size:12px; color:var(--muted); }
    h1 { font-size:26px; font-weight:700; margin-bottom:6px; }
    .sub { font-size:15px; color:var(--sub); margin-bottom:26px; line-height:1.5; }
    .msg { display:none; font-size:14px; border-radius:9px; padding:12px 15px; margin-bottom:18px; line-height:1.5; }
    .msg.err { display:block; background:var(--red-bg); border:1px solid var(--red-border); color:var(--red); }
    .msg.ok  { display:block; background:var(--green-bg); border:1px solid var(--green-border); color:var(--green); }
    .field { margin-bottom:16px; }
    label { display:block; font-family:var(--mono); font-size:11px; font-weight:500; letter-spacing:0.09em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
    input { width:100%; height:48px; background:var(--bg3); border:1px solid var(--border); border-radius:9px; padding:0 14px; font-family:var(--sans); font-size:15px; color:var(--text); outline:none; transition:border-color 0.13s,box-shadow 0.13s; }
    input:focus { border-color:var(--border-focus); box-shadow:0 0 0 3px var(--gold-ring); background:var(--bg2); }
    ::placeholder { color:var(--muted); }
    .pw-wrap { position:relative; }
    .pw-wrap input { padding-right:50px; }
    .eye-btn { position:absolute; right:0; top:0; width:48px; height:48px; background:none; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--muted); transition:color 0.13s; }
    .eye-btn:hover { color:var(--text); }
    .eye-btn svg { width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; pointer-events:none; }
    .pw-reqs { margin-top:9px; display:none; }
    .pw-reqs.show { display:block; }
    .req-row { display:flex; align-items:center; gap:7px; font-size:12px; color:var(--muted); margin-bottom:4px; }
    .req-dot { width:6px; height:6px; border-radius:50%; background:var(--border); border:1px solid var(--muted); flex-shrink:0; transition:all 0.2s; }
    .req-row.met .req-dot { background:var(--green); border-color:var(--green); }
    .req-row.met { color:var(--green); }
    .btn { width:100%; height:50px; background:var(--text); border:none; border-radius:10px; font-family:var(--mono); font-size:13px; font-weight:600; letter-spacing:0.08em; color:var(--bg2); cursor:pointer; margin-top:6px; display:flex; align-items:center; justify-content:center; gap:9px; transition:background 0.15s; }
    .btn:hover:not(:disabled) { background:var(--gold2); color:#fff; }
    [data-theme="dark"] .btn:hover:not(:disabled) { color:#0A0A0B; }
    .btn:disabled { opacity:0.3; cursor:not-allowed; }
    .state-icon { width:56px; height:56px; border-radius:50%; background:var(--gold-pale); border:1px solid var(--gold); display:flex; align-items:center; justify-content:center; margin:0 auto 22px; }
    .state-icon svg { width:26px; height:26px; stroke:var(--gold2); fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
    .back { text-align:center; font-size:13px; color:var(--muted); margin-top:20px; }
    .back a { color:var(--gold2); cursor:pointer; font-weight:500; text-decoration:none; }
    .back a:hover { text-decoration:underline; }
    .spin { width:15px; height:15px; border:2px solid rgba(255,255,255,0.25); border-top-color:currentColor; border-radius:50%; animation:sp 0.7s linear infinite; display:none; }
    @keyframes sp { to{transform:rotate(360deg);} }
    .theme-bar { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:100; display:flex; align-items:center; background:var(--bg2); border:1px solid var(--border); border-radius:40px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,0.12); }
    .tb-opt { display:flex; align-items:center; gap:7px; height:38px; padding:0 18px; font-family:var(--mono); font-size:10px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); cursor:pointer; border:none; background:none; transition:all 0.15s; }
    .tb-opt svg { width:13px; height:13px; stroke:currentColor; fill:none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; }
    .tb-opt.active { background:var(--bg3); color:var(--text); }
    .tb-divider { width:1px; height:20px; background:var(--border); }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="brand">
      <img src="/static/assets/PantheonLogoGold.png" alt="P">
      <span class="brand-name">Pantheon</span>
      <div class="brand-sep"></div>
      <span class="brand-sub">Life Safety OS</span>
    </div>

    <!-- Reset form -->
    <div id="vForm">
      <h1>Set new password</h1>
      <p class="sub">Choose a strong password for your Pantheon account.</p>
      <div id="formMsg" class="msg"></div>
      <div class="field">
        <label>New Password</label>
        <div class="pw-wrap">
          <input type="password" id="pw1" placeholder="New password" autocomplete="new-password" oninput="checkReqs()">
          <button class="eye-btn" type="button" onclick="toggleEye('pw1',this)" tabindex="-1">
            <svg viewBox="0 0 20 20"><path d="M1 10s3-6 9-6 9 6 9 6-3 6-9 6-9-6-9-6z"/><circle cx="10" cy="10" r="2.5"/></svg>
          </button>
        </div>
        <div class="pw-reqs" id="pwReqs">
          <div class="req-row" id="req-len"><div class="req-dot"></div>At least 8 characters</div>
          <div class="req-row" id="req-upper"><div class="req-dot"></div>At least 1 uppercase letter</div>
          <div class="req-row" id="req-special"><div class="req-dot"></div>At least 1 special character (!@#$%^&amp;*)</div>
        </div>
      </div>
      <div class="field">
        <label>Confirm New Password</label>
        <div class="pw-wrap">
          <input type="password" id="pw2" placeholder="Repeat new password" autocomplete="new-password">
          <button class="eye-btn" type="button" onclick="toggleEye('pw2',this)" tabindex="-1">
            <svg viewBox="0 0 20 20"><path d="M1 10s3-6 9-6 9 6 9 6-3 6-9 6-9-6-9-6z"/><circle cx="10" cy="10" r="2.5"/></svg>
          </button>
        </div>
      </div>
      <button class="btn" id="saveBtn" onclick="doReset()">
        <span id="saveLbl">Save New Password</span>
        <div class="spin" id="saveSpin"></div>
      </button>
      <div class="back"><a href="/login">Cancel</a></div>
    </div>

    <!-- Done state -->
    <div id="vDone" style="display:none; text-align:center">
      <div class="state-icon">
        <svg viewBox="0 0 20 20"><polyline points="4,10 8,14 16,6"/></svg>
      </div>
      <h1>Password updated</h1>
      <p class="sub">Your password has been changed. You can now sign in with your new password.</p>
      <button class="btn" onclick="window.location.href='/login'" style="margin-top:4px">Go to Sign In</button>
    </div>

  </div>
</div>

<div class="theme-bar">
  <button class="tb-opt active" id="tbLight" onclick="applyTheme('light')">
    <svg viewBox="0 0 20 20"><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.93 4.93l1.41 1.41M13.66 13.66l1.41 1.41M4.93 15.07l1.41-1.41M13.66 6.34l1.41-1.41M10 7a3 3 0 100 6 3 3 0 000-6z"/></svg>
    Light
  </button>
  <div class="tb-divider"></div>
  <button class="tb-opt" id="tbDark" onclick="applyTheme('dark')">
    <svg viewBox="0 0 20 20"><path d="M15 10.5a6 6 0 01-8.5-8.5 7 7 0 108.5 8.5z"/></svg>
    Dark
  </button>
</div>

<script>
var TOKEN = '{{ token }}';  // Flask injects this

function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('tbLight').className = 'tb-opt' + (t==='light'?' active':'');
  document.getElementById('tbDark').className  = 'tb-opt' + (t==='dark'?' active':'');
  localStorage.setItem('pantheon-theme', t);
}
applyTheme(localStorage.getItem('pantheon-theme') || 'light');

function toggleEye(id, btn) {
  var inp = document.getElementById(id);
  var show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.querySelector('svg').innerHTML = show
    ? '<path d="M3 3l14 14M10.5 5c4.3.4 7.5 5 7.5 5s-1.2 2-3.3 3.7M6 6.3A9.4 9.4 0 001 10s3 6 9 6c1.8 0 3.4-.5 4.8-1.3"/>'
    : '<path d="M1 10s3-6 9-6 9 6 9 6-3 6-9 6-9-6-9-6z"/><circle cx="10" cy="10" r="2.5"/>';
}

function checkReqs() {
  var pw = document.getElementById('pw1').value;
  document.getElementById('pwReqs').className = 'pw-reqs' + (pw.length ? ' show' : '');
  setReq('req-len',     pw.length >= 8);
  setReq('req-upper',   /[A-Z]/.test(pw));
  setReq('req-special', /[!@#$%^&*()\-_=+\[\]{};':"\\|,.<>/?`~]/.test(pw));
}
function setReq(id, met) { document.getElementById(id).className = 'req-row' + (met ? ' met' : ''); }
function pwValid(pw) { return pw.length >= 8 && /[A-Z]/.test(pw) && /[!@#$%^&*()\-_=+\[\]{};':"\\|,.<>/?`~]/.test(pw); }

function doReset() {
  var pw  = document.getElementById('pw1').value;
  var pw2 = document.getElementById('pw2').value;
  var msg = document.getElementById('formMsg');
  msg.className = 'msg'; msg.textContent = '';
  if (!pwValid(pw)) { msg.textContent = 'Password must be 8+ characters, include 1 uppercase and 1 special character.'; msg.className = 'msg err'; return; }
  if (pw !== pw2)   { msg.textContent = 'Passwords do not match.'; msg.className = 'msg err'; return; }
  document.getElementById('saveBtn').disabled = true;
  document.getElementById('saveSpin').style.display = 'flex';
  document.getElementById('saveLbl').style.display = 'none';
  fetch('/api/auth/reset_password', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({token: TOKEN, password: pw})
  })
  .then(function(r){ return r.json(); })
  .then(function(d) {
    document.getElementById('saveBtn').disabled = false;
    document.getElementById('saveSpin').style.display = 'none';
    document.getElementById('saveLbl').style.display = '';
    if (d.ok) {
      document.getElementById('vForm').style.display = 'none';
      document.getElementById('vDone').style.display = '';
    } else {
      msg.textContent = d.error || 'Something went wrong. Try requesting a new link.';
      msg.className = 'msg err';
    }
  })
  .catch(function() {
    document.getElementById('saveBtn').disabled = false;
    document.getElementById('saveSpin').style.display = 'none';
    document.getElementById('saveLbl').style.display = '';
    msg.textContent = 'Connection error. Try again.'; msg.className = 'msg err';
  });
}

document.getElementById('pw2').addEventListener('keydown', function(e){ if(e.key==='Enter') doReset(); });
</script>
</body>
</html>
